<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miner Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Rendered by js/app.js -->
  </div>

  <!-- Global error overlay (managed by app.js showError) -->
  <div id="error-overlay" hidden>
    <div id="error-box">
      <button id="error-close" aria-label="Close">[X]</button>
      <p id="error-message"></p>
    </div>
  </div>

  <!-- Search view template -->
  <template id="tpl-search">
    <div class="view-search">
      <div class="search-terminal">
        <h1 class="brand">&gt; MINER_DASHBOARD</h1>
        <fieldset class="search-card">
          <legend>// query</legend>
          <form id="search-form" novalidate>
            <div class="input-group">
              <label for"address-input">User:</label>
              <input
                id="address-input"
                type="text"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="none"
                spellcheck="false"
                placeholder="bc1q… or 1… or 3…"
                aria-label="Bitcoin address"
                required
              />
              <button type="submit">[ EXEC ]</button>
            </div>
            <div class="pool-select-wrap">
              <label for="pool-select">Pool</label>
              <select id="pool-select" aria-label="Select pool" disabled>
                <option value="">Loading…</option>
              </select>
            </div>
            <p id="search-error" class="field-error" hidden></p>
          </form>
        </fieldset>
      </div>
    </div>
  </template>

  <!-- Stats view template -->
  <template id="tpl-stats">
    <div class="view-stats">
      <header class="stats-header">
        <a href="/" class="back-link" id="back-link">[ BACK ]</a>
        <h1 class="brand">&gt; MINER_DASHBOARD</h1>
        <div class="pool-select-wrap">
          <label for="pool-select">Pool</label>
          <select id="pool-select" aria-label="Select pool" disabled>
            <option value="">Loading…</option>
          </select>
        </div>
        <div class="worker-select-wrap">
          <label for="worker-select">Worker</label>
          <select id="worker-select" aria-label="Select worker"></select>
        </div>
        <span class="refresh-info" id="refresh-info"></span>
      </header>

      <div id="address-display" class="address-display"></div>

      <div id="stats-content" hidden>
        <!-- ═══ Pool Statistics ═══════════════════════════════════════════ -->
        <div class="stats-group-label">Pool Statistics</div>

        <fieldset class="stats-section">
          <legend>Pool Hashrate</legend>
          <div class="cards-grid" id="cards-pool-hashrate"></div>
        </fieldset>

        <fieldset class="stats-section">
          <legend>Pool Shares</legend>
          <div class="cards-grid" id="cards-pool-shares"></div>
        </fieldset>

        <fieldset class="stats-section">
          <legend>Pool Status</legend>
          <div class="cards-grid" id="cards-pool-status"></div>
        </fieldset>

        <!-- ═══ Miner Statistics ══════════════════════════════════════════ -->
        <div class="stats-group-label">Miner Statistics</div>

        <fieldset class="stats-section">
          <legend>Hashrate</legend>
          <div class="cards-grid" id="cards-hashrate"></div>
        </fieldset>

        <fieldset class="stats-section">
          <legend>Shares</legend>
          <div class="cards-grid" id="cards-shares"></div>
        </fieldset>

        <fieldset class="stats-section">
          <legend>Status</legend>
          <div class="cards-grid" id="cards-status"></div>
        </fieldset>
      </div>
    </div>
  </template>

  <script src="js/app.js"></script>
</body>
</html>
